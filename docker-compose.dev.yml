services:
  postgres:
    image: postgres:15-alpine
    container_name: commandix_dev_postgres
    environment:
      POSTGRES_USER: commandix
      POSTGRES_PASSWORD: commandix_pass
      POSTGRES_DB: commandix_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commandix -d commandix_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
